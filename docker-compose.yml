version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: absenlah_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-absenlah_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_DB: ${DB_NAME:-absenlah_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: absenlah_backend
    restart: always
    working_dir: /usr/src/app
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - PORT=${PORT:-8080}
      - JWT_SECRET=${JWT_SECRET}
      - DB_URI=postgres://${DB_USER:-absenlah_admin}:${DB_PASSWORD:-admin123}@db:5432/${DB_NAME:-absenlah_db}
    depends_on:
      - db

volumes:
  postgres_data:
